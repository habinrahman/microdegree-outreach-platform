# Merge gate: DB fixture isolation, cleanup verification, blocked-email ORM guard,
# and follow-up eligibility tests that historically wrote synthetic rows via SessionLocal.
#
# Fails the build if any of these regress (silent pollution against a shared dev DB).

name: Backend fixture isolation

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  fixture-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fixture isolation regression gate
        run: |
          python -m pytest \
            tests/test_fixture_cleanup_verification.py \
            tests/test_fixture_email_isolation.py \
            tests/test_followup_eligibility.py \
            -v --tb=short
